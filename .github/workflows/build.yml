name: Build Electron Installers

on:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: AgentBoard-Setup-Windows
            artifact_glob: dist-electron/*.exe
          - os: macos-latest
            platform: mac
            artifact_name: AgentBoard-Setup-Mac
            artifact_glob: dist-electron/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js + Electron (${{ matrix.platform }})
        run: npm run electron:build:${{ matrix.platform }}
        env:
          # Disable code signing on both platforms
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Skip macOS notarization
          SKIP_NOTARIZATION: true
          # Next.js public env vars (required at build time)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # Server-side env vars (embedded into the Next.js build)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AgentBoard-Setup-Windows
          path: release-assets/windows

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: AgentBoard-Setup-Mac
          path: release-assets/mac

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "AgentBoard v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            Automated build from commit ${{ github.sha }}

            **Download the installer for your platform below.**

            - `AgentBoard Setup *.exe` — Windows installer
            - `AgentBoard-*.dmg` — macOS disk image
          draft: false
          prerelease: false
          files: |
            release-assets/windows/*
            release-assets/mac/*
